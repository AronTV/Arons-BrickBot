<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arons BrickBot</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="card">

        <!-- APP HEADER (Mini Upgrade #2) -->
        <div class="topbar">

            <div>
                <h2 style="margin:0;">🧱 Arons BrickBot</h2>
                <small style="opacity:0.7;">Set Preis & Vergleich Tool</small>
            </div>

            <button onclick="toggleTheme()">
                🌓 Theme
            </button>

        </div>

        <hr style="opacity:0.1;">

        <!-- SEARCH BAR -->
        <div style="display:flex; gap:10px; margin-top:10px;">

            <input id="articleInput"
                   type="text"
                   placeholder="Artikelnummer (z.B. 108712)">

            <button onclick="loadProduct(document.getElementById('articleInput').value)">
                🔍
            </button>

        </div>

        <!-- PRICE BOX -->
        <div class="price-box">

            <div>
                SetDB<br>
                <b id="price-setdb">-</b>
            </div>

            <div>
                BlueBrixx<br>
                <b id="price-bluebrixx">-</b>
            </div>

            <div>
                Status<br>
                <b id="status">-</b>
            </div>

        </div>

        <!-- IMAGE -->
        <div style="text-align:center; margin-top:15px;">
            <img id="image" style="max-width:400px; border-radius:12px;">
        </div>

        <!-- INFO AREA -->
        <div id="info" style="margin-top:20px;"></div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
