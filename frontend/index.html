<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arons BrickBot</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <!-- =========================
                 HEADER
            ========================== -->

            <div class="topbar">
                <h2>🧱 Arons BrickBot</h2>
            </div>

            <!-- =========================
                 SEARCH
            ========================== -->

            <div style="display:flex; gap:10px; margin-bottom:15px;">

                <input
                    id="input"
                    type="text"
                    placeholder="Artikelnummer eingeben (z.B. 108712)"
                >

                <button id="searchBtn">
                    Suchen
                </button>

            </div>

            <!-- =========================
                 OUTPUT AREA
            ========================== -->

            <div id="info">
                <p>🔎 Gib eine Artikelnummer ein</p>
            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>
</html>
