<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Arons BrickBot</title>

    <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="container">

    <div class="card">

        <h1 id="title">Arons BrickBot</h1>

        <input id="articleInput"
               type="text"
               placeholder="Artikelnummer eingeben (z.B. 108712)" />

        <button onclick="loadProduct(document.getElementById('articleInput').value)">
            🔍 Suchen
        </button>

        <div style="margin-top:20px;">
            <img id="image" />
        </div>

        <div style="margin-top:20px;">
            <div>SetDB: <b id="price-setdb">-</b></div>
            <div>BlueBrixx: <b id="price-bluebrixx">-</b></div>
            <div>Status: <b id="status">-</b></div>
        </div>

        <div id="info" style="margin-top:20px;"></div>

    </div>

</div>

<!-- 🔥 WICHTIG: APP.JS MUSS LADEN -->
<script src="app.js"></script>

</body>
</html>
